        .item { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; padding: 18px; margin-bottom: 18px; }

        .tag { display: inline-block; background: var(--bg-secondary); border: 1px solid var(--accent-cyan); color: var(--accent-cyan); padding: 2px 8px; border-radius: 4px; font-size: 0.75em; margin-right: 5px; }
        ul { margin: 10px 0 10px 20px; color: var(--text-secondary); }
        li { margin-bottom: 8px; }
        a { color: var(--accent-cyan); }
        strong { color: var(--text-primary); }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { border: 1px solid var(--border-color); padding: 10px; text-align: left; }
        th { background: var(--bg-secondary); color: var(--accent-purple); }
        footer { text-align: center; padding: 30px; color: var(--text-secondary); border-top: 1px solid var(--border-color); margin-top: 40px; font-size: 0.9em; }
